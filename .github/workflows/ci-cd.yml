name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # Run pipeline on pushes to the 'main' branch
  pull_request:
    branches:
      - main  # Run pipeline on PRs to the 'main' branch

jobs:
  # 1. Job: Run tests and linting
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Check out the repository

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'  # Change this if you use another Python version

      - name: Install dependencies
        run: |
          python -m venv venv  # Create a virtual environment
          source venv/bin/activate
          pip install -r requirements.txt  # Install Python dependencies
          pip install coverage  # Install coverage to measure test coverage

      - name: Run tests
        run: |
          source venv/bin/activate
          coverage run manage.py test  # Run tests and measure coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/  # Store the coverage report as an artifact

  # 2. Job: Build and push Docker image
  build:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t noateomi/yoga-sequencing-app .  # Build Docker image
          docker tag noateomi/yoga-sequencing-app:latest noateomi/yoga-sequencing-app:${{ github.sha }}
          docker push noateomi/yoga-sequencing-app:latest  # Push the image to Docker Hub
          docker push noateomi/yoga-sequencing-app:${{ github.sha }}  # Push the image with the Git SHA as a tag

  # 3. Job: Bump Version and Create GitHub Release
  release:
    runs-on: ubuntu-latest
    needs: build  # Only run after the build job
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Bump version
        id: bump_version
        run: |
          # Fetch current version from version.txt or __version__.py
          current_version=$(cat version.txt)
          echo "Current version: $current_version"

          # Increment the patch version (could be updated for major/minor versions as needed)
          IFS='.' read -r major minor patch <<< "$current_version"
          new_version="$major.$minor.$((patch + 1))"
          echo "New version: $new_version"

          # Save the new version in the file
          echo "$new_version" > version.txt

          # Commit the new version
          git config --local user.email "you@example.com"
          git config --local user.name "GitHub Actions"
          git commit -am "Bump version to $new_version"
          git tag "v$new_version"
          git push origin --tags
          git push origin main

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ steps.bump_version.outputs.new_version }}"  # Use the new tag
          release_name: "Release v${{ steps.bump_version.outputs.new_version }}"
          body: |
            Automated release for version v${{ steps.bump_version.outputs.new_version }}.
          draft: false
          prerelease: false